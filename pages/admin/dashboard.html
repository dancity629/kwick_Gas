<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Dashboard – GasGo</title>
<link rel="stylesheet" href="../../css/style.css"/>
<style>
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.5rem}
.stat-card .stat-icon{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.stat-card .stat-value{font-size:2rem;font-weight:700;font-family:var(--font-display);color:var(--text-primary)}
.stat-card .stat-label{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.stat-card .stat-change{font-size:.8rem;display:flex;align-items:center;gap:.25rem}
.stat-change.up{color:#22c55e}.stat-change.down{color:#ef4444}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.card-title{font-size:.95rem;font-weight:600;color:var(--text-primary)}
.activity-list{display:flex;flex-direction:column;gap:.75rem}
.activity-item{display:flex;gap:.75rem;align-items:flex-start}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.activity-dot.green{background:#22c55e}.activity-dot.red{background:#ef4444}.activity-dot.yellow{background:#f59e0b}
.activity-text{font-size:.85rem;color:var(--text-secondary);line-height:1.4}
.activity-time{font-size:.75rem;color:var(--text-muted);margin-top:.15rem}
.chart-bar-container{display:flex;flex-direction:column;gap:.6rem}
.chart-bar-row{display:flex;align-items:center;gap.75rem;gap:.75rem}
.chart-bar-label{font-size:.78rem;color:var(--text-muted);width:60px;flex-shrink:0;text-align:right}
.chart-bar-track{flex:1;height:10px;background:var(--surface-raised);border-radius:99px;overflow:hidden}
.chart-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .6s ease}
.chart-bar-val{font-size:.78rem;color:var(--text-secondary);width:36px;flex-shrink:0}
.top-riders-list{display:flex;flex-direction:column;gap:.6rem}
.rider-row{display:flex;align-items:center;gap:.75rem}
.rider-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.rider-info{flex:1;min-width:0}
.rider-name{font-size:.85rem;color:var(--text-primary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rider-deliveries{font-size:.75rem;color:var(--text-muted)}
.rider-badge{font-size:.75rem;font-weight:600;color:var(--primary)}
.alert-banner{background:rgba(255,107,43,.08);border:1px solid rgba(255,107,43,.25);border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.alert-banner .icon{font-size:1.1rem;flex-shrink:0}
.alert-banner .text{font-size:.85rem;color:var(--text-secondary)}
.alert-banner .text strong{color:var(--primary)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.qa-btn{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:all .2s;text-decoration:none}
.qa-btn:hover{border-color:var(--primary);background:var(--primary-dim)}
.qa-btn .qa-icon{font-size:1.1rem}
.qa-btn .qa-label{font-size:.82rem;color:var(--text-secondary);font-weight:500}
</style>
</head>
<body>
<div class="app-layout" id="appLayout"></div>

<script src="../../js/store.js"></script>
<script src="../../js/ui.js"></script>
<script>
const user = initPage('admin','dashboard','Admin Dashboard');
const main = document.getElementById('mainContent');

const orders   = Orders.all();
const users    = Users.all();
const riders   = users.filter(u=>u.role==='rider');
const customers= users.filter(u=>u.role==='customer');
const vendors  = Vendors.all();
const today    = new Date().toDateString();

const todayOrders   = orders.filter(o=>new Date(o.createdAt).toDateString()===today);
const pendingOrders = orders.filter(o=>['pending','confirmed'].includes(o.status));
const delivered     = orders.filter(o=>o.status==='delivered');
const totalRevenue  = delivered.reduce((s,o)=>s+(o.total||0),0);
const todayRevenue  = todayOrders.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.total||0),0);

// Rider stats
const riderStats = riders.map(r=>{
  const rOrders = orders.filter(o=>o.riderId===r.id && o.status==='delivered');
  return {...r, deliveries: rOrders.length};
}).sort((a,b)=>b.deliveries-a.deliveries);

// Orders per day (last 7 days)
const last7 = [];
for(let i=6;i>=0;i--){
  const d = new Date(); d.setDate(d.getDate()-i);
  const ds = d.toDateString();
  const cnt = orders.filter(o=>new Date(o.createdAt).toDateString()===ds).length;
  last7.push({label:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()], count:cnt});
}
const maxDay = Math.max(...last7.map(d=>d.count),1);

// Recent activity
const recent = [...orders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);

function activityEntry(o){
  const c = users.find(u=>u.id===o.customerId);
  const name = c?c.name:'Customer';
  let dot='', text='';
  if(o.status==='delivered'){dot='green';text=`Order #${o.id.slice(-6)} delivered to <strong>${name}</strong>`;}
  else if(o.status==='cancelled'){dot='red';text=`Order #${o.id.slice(-6)} was cancelled`;}
  else if(o.status==='pending'){dot='yellow';text=`New order from <strong>${name}</strong> awaiting confirmation`;}
  else{dot='';text=`Order #${o.id.slice(-6)} status: ${o.status}`;}
  return `<div class="activity-item">
    <div class="activity-dot ${dot}"></div>
    <div>
      <div class="activity-text">${text}</div>
      <div class="activity-time">${fmt.date(o.createdAt)}</div>
    </div>
  </div>`;
}

// Unread notifications for admin
const notifs = Notifications.forUser(user.id);
const unreadNotifs = notifs.filter(n=>!n.read);

main.innerHTML = `
${unreadNotifs.length>0?`<div class="alert-banner"><span class="icon">🔔</span><span class="text">You have <strong>${unreadNotifs.length} unread notification${unreadNotifs.length>1?'s':''}</strong>. <a href="#" style="color:var(--primary)">View all</a></span></div>`:''}

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(255,107,43,.12);color:var(--primary)">📦</div>
    <div class="stat-value">${orders.length}</div>
    <div class="stat-label">Total Orders</div>
    <div class="stat-change up">▲ ${todayOrders.length} today</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(34,197,94,.12);color:#22c55e">✅</div>
    <div class="stat-value">${delivered.length}</div>
    <div class="stat-label">Delivered</div>
    <div class="stat-change up">▲ ${Math.round(delivered.length/Math.max(orders.length,1)*100)}% rate</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(245,158,11,.12);color:#f59e0b">⏳</div>
    <div class="stat-value">${pendingOrders.length}</div>
    <div class="stat-label">Pending</div>
    <div class="stat-change ${pendingOrders.length>5?'down':'up'}">${pendingOrders.length>5?'▼ High queue':'▲ Manageable'}</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(99,102,241,.12);color:#6366f1">👥</div>
    <div class="stat-value">${customers.length}</div>
    <div class="stat-label">Customers</div>
    <div class="stat-change up">▲ ${riders.length} riders active</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(255,107,43,.12);color:var(--primary)">🏪</div>
    <div class="stat-value">${vendors.length}</div>
    <div class="stat-label">Vendors</div>
    <div class="stat-change up">▲ All active</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:rgba(34,197,94,.12);color:#22c55e">💰</div>
    <div class="stat-value">${fmt.currency(totalRevenue)}</div>
    <div class="stat-label">Total Revenue</div>
    <div class="stat-change up">▲ ${fmt.currency(todayRevenue)} today</div>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-header">
      <span class="card-title">📈 Orders (Last 7 Days)</span>
    </div>
    <div class="chart-bar-container">
      ${last7.map(d=>`
      <div class="chart-bar-row">
        <div class="chart-bar-label">${d.label}</div>
        <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(d.count/maxDay*100)}%"></div></div>
        <div class="chart-bar-val">${d.count}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">🏍️ Top Riders</span>
      <a href="users.html" class="btn btn-ghost btn-sm">See All</a>
    </div>
    <div class="top-riders-list">
      ${riderStats.slice(0,5).map((r,i)=>`
      <div class="rider-row">
        <div class="rider-avatar">${r.name.charAt(0).toUpperCase()}</div>
        <div class="rider-info">
          <div class="rider-name">${r.name}</div>
          <div class="rider-deliveries">${r.deliveries} deliveries</div>
        </div>
        <div class="rider-badge">#${i+1}</div>
      </div>`).join('')}
      ${riderStats.length===0?'<div style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:1rem">No riders yet</div>':''}
    </div>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-header">
      <span class="card-title">🕐 Recent Activity</span>
      <a href="orders.html" class="btn btn-ghost btn-sm">All Orders</a>
    </div>
    <div class="activity-list">
      ${recent.length?recent.map(o=>activityEntry(o)).join(''):'<div style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:1rem">No activity yet</div>'}
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">⚡ Quick Actions</span></div>
    <div class="quick-actions">
      <a class="qa-btn" href="orders.html"><span class="qa-icon">📋</span><span class="qa-label">Manage Orders</span></a>
      <a class="qa-btn" href="users.html"><span class="qa-icon">👥</span><span class="qa-label">Manage Users</span></a>
      <a class="qa-btn" href="vendors.html"><span class="qa-icon">🏪</span><span class="qa-label">Manage Vendors</span></a>
      <a class="qa-btn" href="analytics.html"><span class="qa-icon">📊</span><span class="qa-label">Analytics</span></a>
      <a class="qa-btn" href="reports.html"><span class="qa-icon">📄</span><span class="qa-label">Reports</span></a>
      <a class="qa-btn" href="#" onclick="addTestOrder()"><span class="qa-icon">➕</span><span class="qa-label">Seed Test Order</span></a>
    </div>
  </div>
</div>
`;

function addTestOrder(){
  const custs = Users.all().filter(u=>u.role==='customer');
  if(!custs.length){Toast.warn('No customers found'); return;}
  const c = custs[0];
  const v = Vendors.all()[0];
  Orders.create({customerId:c.id,vendorId:v?.id||'v1',cylinderSize:'6kg',qty:1,total:3900,paymentMethod:'wallet',address:'Test Address, Lafia',notes:'Test order from admin'});
  Toast.success('Test order seeded!');
  setTimeout(()=>location.reload(),800);
}
</script>
</body>
</html>
