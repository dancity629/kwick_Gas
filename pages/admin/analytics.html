<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics – GasGo Admin</title>
<link rel="stylesheet" href="../../css/style.css"/>
<style>
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
.kpi-value{font-size:1.8rem;font-weight:700;font-family:var(--font-display);color:var(--primary)}
.kpi-label{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.3rem}
.kpi-sub{font-size:.8rem;color:var(--text-secondary);margin-top:.25rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem}
.card-title{font-size:.95rem;font-weight:600;color:var(--text-primary);margin-bottom:1rem}
.bar-chart{display:flex;flex-direction:column;gap:.5rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-label{font-size:.78rem;color:var(--text-muted);width:80px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:12px;background:var(--surface-raised);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .8s ease}
.bar-val{font-size:.78rem;color:var(--text-secondary);width:60px;flex-shrink:0}
.donut-row{display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:.6rem}
.legend-item{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.period-tabs{display:flex;gap:.5rem;margin-bottom:1.25rem}
.period-tab{padding:.3rem .8rem;border-radius:99px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .2s}
.period-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.table-sm{width:100%;border-collapse:collapse}
.table-sm th{text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:.5rem .6rem;border-bottom:1px solid var(--border)}
.table-sm td{padding:.6rem;border-bottom:1px solid var(--border);font-size:.83rem;color:var(--text-secondary)}
.table-sm tr:last-child td{border-bottom:none}
.table-sm tr:hover td{background:var(--surface-raised)}
</style>
</head>
<body>
<div class="app-layout" id="appLayout"></div>
<script src="../../js/store.js"></script>
<script src="../../js/ui.js"></script>
<script>
initPage('admin','analytics','Analytics');
const main = document.getElementById('mainContent');

let period = '30'; // days

function getData(days){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-parseInt(days));
  const orders = Orders.all().filter(o=>new Date(o.createdAt)>=cutoff);
  const delivered = orders.filter(o=>o.status==='delivered');
  const cancelled = orders.filter(o=>o.status==='cancelled');
  const pending   = orders.filter(o=>['pending','confirmed','transit'].includes(o.status));
  const revenue   = delivered.reduce((s,o)=>s+(o.total||0),0);
  const avgOrder  = delivered.length ? revenue/delivered.length : 0;
  const complRate = orders.length ? (delivered.length/orders.length*100) : 0;

  // Orders per day
  const byDay = {};
  for(let i=parseInt(days)-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    byDay[key]=(byDay[key]||0);
  }
  orders.forEach(o=>{
    const key=o.createdAt?.slice(0,10);
    if(key&&byDay[key]!==undefined) byDay[key]++;
  });

  // Cylinder breakdown
  const cylBreak = {};
  orders.forEach(o=>{cylBreak[o.cylinderSize]=(cylBreak[o.cylinderSize]||0)+(o.qty||1);});

  // Vendor breakdown
  const vendorBreak = {};
  delivered.forEach(o=>{
    const v=Vendors.all().find(x=>x.id===o.vendorId);
    const name=v?.name||o.vendorId||'Unknown';
    vendorBreak[name]=(vendorBreak[name]||0)+(o.total||0);
  });

  // Rider performance
  const riderPerf = {};
  delivered.forEach(o=>{
    if(o.riderId){
      const r=Users.find(o.riderId);
      const name=r?.name||o.riderId;
      if(!riderPerf[name]) riderPerf[name]={deliveries:0,revenue:0};
      riderPerf[name].deliveries++;
      riderPerf[name].revenue+=(o.total||0);
    }
  });

  return {orders,delivered,cancelled,pending,revenue,avgOrder,complRate,byDay,cylBreak,vendorBreak,riderPerf};
}

function buildDonut(data, size=100){
  const total=Object.values(data).reduce((s,v)=>s+v,0);
  if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="var(--border)" stroke-width="18"/></svg>`;
  const colors=['#ff6b2b','#6366f1','#22c55e','#f59e0b','#ec4899'];
  let offset=0;
  const slices=[];
  Object.entries(data).forEach(([label,val],i)=>{
    const pct=val/total;
    const dash=pct*219.9;
    slices.push(`<circle cx="50" cy="50" r="35" fill="none" stroke="${colors[i%colors.length]}" stroke-width="18"
      stroke-dasharray="${dash} ${219.9-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 50 50)"/>`);
    offset+=dash;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${slices.join('')}</svg>`;
}

function render(){
  const d = getData(period);
  const allDays = Object.entries(d.byDay);
  const maxDay = Math.max(...allDays.map(e=>e[1]),1);

  // Show only evenly sampled days for chart (max 14 bars)
  const step = Math.max(1,Math.ceil(allDays.length/14));
  const chartDays = allDays.filter((_,i)=>i%step===0||i===allDays.length-1);

  const cylColors={'3kg':'#ff6b2b','6kg':'#6366f1','12.5kg':'#22c55e','25kg':'#f59e0b','50kg':'#ec4899'};
  const maxCyl = Math.max(...Object.values(d.cylBreak),1);
  const maxVend = Math.max(...Object.values(d.vendorBreak),1);

  const riderRows = Object.entries(d.riderPerf).sort((a,b)=>b[1].deliveries-a[1].deliveries).slice(0,8);

  main.innerHTML = `
  <div class="period-tabs">
    ${[['7','7 Days'],['30','30 Days'],['90','90 Days'],['365','1 Year']].map(([v,l])=>
      `<button class="period-tab ${period===v?'active':''}" onclick="setPeriod('${v}')">${l}</button>`
    ).join('')}
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-value">${d.orders.length}</div>
      <div class="kpi-label">Total Orders</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${fmt.currency(d.revenue)}</div>
      <div class="kpi-label">Revenue</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${d.complRate.toFixed(1)}%</div>
      <div class="kpi-label">Completion Rate</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${fmt.currency(d.avgOrder)}</div>
      <div class="kpi-label">Avg Order Value</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${d.delivered.length}</div>
      <div class="kpi-label">Delivered</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${d.cancelled.length}</div>
      <div class="kpi-label">Cancelled</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">📈 Daily Orders</div>
      <div class="bar-chart">
        ${chartDays.map(([date,cnt])=>`
        <div class="bar-row">
          <div class="bar-label">${date.slice(5)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxDay*100)}%;background:var(--primary)"></div></div>
          <div class="bar-val">${cnt}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">🧴 Cylinder Demand</div>
      ${Object.keys(d.cylBreak).length ? `
      <div class="donut-row">
        ${buildDonut(d.cylBreak,120)}
        <div class="donut-legend">
          ${Object.entries(d.cylBreak).map(([size,qty],i)=>{
            const colors=['#ff6b2b','#6366f1','#22c55e','#f59e0b','#ec4899'];
            return `<div class="legend-item"><div class="legend-dot" style="background:${colors[i%colors.length]}"></div>${size} — ${qty} units</div>`;
          }).join('')}
        </div>
      </div>
      <div class="bar-chart" style="margin-top:1rem">
        ${Object.entries(d.cylBreak).map(([size,qty])=>`
        <div class="bar-row">
          <div class="bar-label">${size}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(qty/maxCyl*100)}%;background:${cylColors[size]||'var(--primary)'}"></div></div>
          <div class="bar-val">${qty}</div>
        </div>`).join('')}
      </div>
      ` : '<div style="color:var(--text-muted);text-align:center;padding:1.5rem">No data in this period</div>'}
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">🏪 Revenue by Vendor</div>
      ${Object.keys(d.vendorBreak).length ? `
      <div class="bar-chart">
        ${Object.entries(d.vendorBreak).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([name,rev])=>`
        <div class="bar-row">
          <div class="bar-label">${name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(rev/maxVend*100)}%;background:#6366f1"></div></div>
          <div class="bar-val">${fmt.currency(rev).replace('₦','₦')}</div>
        </div>`).join('')}
      </div>
      ` : '<div style="color:var(--text-muted);text-align:center;padding:1.5rem">No data in this period</div>'}
    </div>

    <div class="card">
      <div class="card-title">🏍️ Rider Performance</div>
      ${riderRows.length ? `
      <table class="table-sm">
        <thead><tr><th>Rider</th><th>Deliveries</th><th>Revenue</th></tr></thead>
        <tbody>
          ${riderRows.map(([name,stats])=>`
          <tr>
            <td>${name}</td>
            <td>${stats.deliveries}</td>
            <td>${fmt.currency(stats.revenue)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ` : '<div style="color:var(--text-muted);text-align:center;padding:1.5rem">No rider data in this period</div>'}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🥧 Order Status Breakdown</div>
    <div class="donut-row">
      ${buildDonut({Delivered:d.delivered.length,Pending:d.pending.length,Cancelled:d.cancelled.length},140)}
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b2b"></div>Delivered — ${d.delivered.length}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>Pending/Active — ${d.pending.length}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Cancelled — ${d.cancelled.length}</div>
      </div>
    </div>
  </div>
  `;
}

function setPeriod(p){ period=p; render(); }

render();
</script>
</body>
</html>
